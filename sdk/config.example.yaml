# 平台连接配置
platform:
  base_url: "http://localhost:8000"
  org_id: "your_org_id"
  token: ""                          # 如有鉴权 token 填写

# Judge LLM 配置（OpenAI 兼容接口）
judge:
  base_url: "https://api.openai.com/v1"
  api_key: "sk-your-key"
  model: "gpt-4o"

# 评测参数
eval:
  agent_id: "your_agent_id"
  knowledge_hub_id: "your_hub_id"
  top_k: 10
  eval_retrieval: true
  eval_generation: true
  file_id_list:
    - "file_id_1"
    - "file_id_2"
  concurrency: 3
  questions_per_chunk: 2
  max_chunks: 50
