services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/server/data   # SQLite DB persistence
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
